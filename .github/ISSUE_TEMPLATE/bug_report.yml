name: 🐞 Bug report
description: Report something broken in the Concordance app or these docs.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. **Do not** report security vulnerabilities here — use
        [private reporting](https://github.com/monsieur-trenton/concordance/security)
        instead (see [SECURITY.md](https://github.com/monsieur-trenton/concordance/blob/main/SECURITY.md)).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: What role were you signed in as?
      options:
        - Student
        - Teacher
        - Admin
        - Not signed in
        - "N/A — this is about the docs"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser / device
      placeholder: "e.g. Chrome on Windows, Safari on iPhone"
    validations:
      required: false
